# Empty relay-side template. Fill site values before installing.

role = "relay"

[tunnel]
id = "change-me-tunnel-id"
node_id = "change-me-relay-node"
listen = "0.0.0.0:9443"
token = "change-me-long-random-token"

[transport]
mode = "quic"
fallback = []
connect_timeout_secs = 10
idle_timeout_secs = 300
max_frame_bytes = 1048576

[security]
mode = "token"
cert = "/etc/biz-tunnel/certs/server.pem"
key = "/etc/biz-tunnel/certs/server.key"

[admin]
listen = "0.0.0.0:18080"

[defaults]
drain_timeout_secs = 30
dial_timeout_secs = 5

[[b_to_a]]
name = "replace-with-reverse-route"
expose_on_relay = "0.0.0.0:0"
target_from_agent = "127.0.0.1:0"
allowed_sources = []

[[a_to_b]]
name = "replace-with-forward-route"
expose_on_agent = "0.0.0.0:0"
target_from_relay = "127.0.0.1:0"
